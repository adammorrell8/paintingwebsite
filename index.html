<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morrell Painting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500&family=Caveat:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --wall: #EDE7DC;
    --cream: #FAF7F0;
    --ink: #2B2620;
    --sage: #3E6485;
    --sage-deep: #24425C;
    --line: rgba(43,38,32,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--wall);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.55;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 28px; }

  header {
    padding: 28px 0;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  .header-inner {
    position: relative;
    display: flex;
    align-items: center;
  }
  .pants-photo {
    position: absolute;
    left: -18px;
    top: 50%;
    transform: translateY(-50%) rotate(-6deg);
    height: 84px;
    width: auto;
    z-index: 1;
    opacity: 0.9;
    pointer-events: none;
  }
  .pants-placeholder {
    position: absolute;
    left: -10px;
    top: 50%;
    transform: translateY(-50%) rotate(-6deg);
    height: 72px;
    width: 96px;
    z-index: 1;
    border-radius: 6px;
    background: repeating-linear-gradient(
      45deg,
      var(--cream),
      var(--cream) 8px,
      #E1D8C4 8px,
      #E1D8C4 16px
    );
    border: 1px dashed rgba(43,38,32,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 9px;
    color: #6b6459;
    padding: 4px;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 2;
    padding-left: 68px;
  }
  .logo .dot {
    width: 13px; height: 13px;
    background: var(--sage);
    border-radius: 3px;
    display: inline-block;
    transform: rotate(-8deg);
  }

  .hero {
    padding: 72px 0 56px;
    text-align: center;
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(34px, 5.5vw, 54px);
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 22px;
  }
  .hero h1 em {
    font-family: 'Caveat', cursive;
    font-style: normal;
    font-weight: 700;
    color: var(--sage-deep);
    font-size: 1.35em;
  }
  .hero p {
    font-size: 18px;
    color: #4a443b;
    max-width: 52ch;
    margin: 0 auto 32px;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 30px;
    border-radius: 6px;
    background: var(--sage-deep);
    color: var(--cream);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .btn:hover { background: var(--ink); transform: translateY(-1px); }

  .gallery { padding: 8px 0 72px; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .gallery-grid img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 8px;
    display: block;
    box-shadow: 0 10px 24px -14px rgba(43,38,32,0.4);
  }
  .placeholder-shot {
    width: 100%;
    height: 260px;
    border-radius: 8px;
    background: repeating-linear-gradient(
      45deg,
      var(--cream),
      var(--cream) 12px,
      #E1D8C4 12px,
      #E1D8C4 24px
    );
    border: 1px dashed rgba(43,38,32,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    font-size: 13px;
    color: #6b6459;
  }

  footer {
    border-top: 1px solid var(--line);
    padding: 24px 0;
    text-align: center;
    font-size: 13px;
    color: #6b6459;
  }

  @media (max-width: 700px) {
    .gallery-grid { grid-template-columns: 1fr; }
  }

  :focus-visible { outline: 2px solid var(--sage-deep); outline-offset: 2px; }
</style>
</head>
<body>

<header>
  <div class="wrap header-inner">
    <img class="pants-photo" src="photos/logo.png" alt="Paint-covered work pants">
    <div class="logo"><span class="dot"></span>Morrell Painting</div>
  </div>
</header>

<main>
  <section class="hero wrap">
    <h1>Hello, I'm Adam Morrell —<br>a <em>fourth generation</em> painter.</h1>
    <p>I do interior and exterior home painting. Click the button below to contact me and schedule your quote.</p>
    <a class="btn" href="https://forms.gle/2Txu1y8ghbuZfBpT9" target="_blank" rel="noopener">Get a quote →</a>
  </section>

  <section class="gallery wrap">
    <div class="gallery-grid">
      <img src="photos/demo1.jpg" alt="Painting project 1">
      <img src="photos/demo2.jpg" alt="Painting project 2">
      <img src="photos/demo3.jpg" alt="Painting project 3">
    </div>
  </section>

</main>

<footer>Morrell Painting · Licensed &amp; Insured</footer>

</body>
</html>
